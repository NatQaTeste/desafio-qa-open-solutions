name: Pipeline de Testes E2E 

# Define quando o teste será executado
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar Dependências
        run: npm install

      - name: Executar Testes do Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headless: true

      - name: Upload de Evidências (Vídeos/Screenshots) 📽️
        if: failure() # Só executa se algum teste falhar
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-de-falha
          path: |
            cypress/screenshots
            cypress/videos